# git-cliff configuration for pascal-mcp's CHANGELOG.md.
#
# pascal-mcp uses Conventional Commits from the first commit, so this
# config maps commit types directly to changelog sections (mirroring
# duetto). Preview locally with:
#
#   git-cliff --latest --strip header        # just the latest tag's entries
#   git-cliff -o CHANGELOG.md                # regenerate the whole file

[changelog]
header = """
# Changelog

All notable changes to pascal-mcp are documented in this file. The format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/); entries are generated from Conventional Commits by git-cliff.
"""
body = """
{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
  - {{ commit.message | split(pat="\n") | first | trim }}
{%- endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
tag_pattern = "^v?[0-9]+\\.[0-9]+\\.[0-9]+(-.*)?$"
sort_commits = "newest"

commit_parsers = [
  { message = "^chore\\(release\\)", skip = true },
  { message = "^feat",     group = "New Features" },
  { message = "^fix",      group = "Bug Fixes" },
  { message = "^perf",     group = "Performance" },
  { message = "^docs",     group = "Documentation" },
  { message = "^refactor", group = "Internal" },
  { message = "^test",     group = "Internal" },
  { message = "^build",    group = "Internal" },
  { message = "^ci",       group = "Internal" },
  { message = "^style",    group = "Internal" },
  { message = "^chore",    group = "Internal" },
  { message = "^revert",   group = "Reverts" },
  { message = ".*",        group = "Other Changes" },
]
