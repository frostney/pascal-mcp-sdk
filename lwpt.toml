# pascal-mcp-sdk — FreePascal-native MCP (Model Context Protocol) server library.
# Bootstrapped with `lwpt init`; built/tested/formatted via lwpt.

[package]
name = "pascal-mcp-sdk"
version = "1.0.0"
# lwpt 0.2.0 discovers dep units through nested manifests, so only
# pascal-mcp-sdk's own source dir is listed here. Dep test files are
# excluded at fetch time so `lwpt test` (which walks every units dir)
# only discovers pascal-mcp-sdk's own suites; [format] likewise excludes
# .lwpt so the formatter never rewrites fetched modules out from under
# the lockfile hash.
units = ["source/units"]

[format]
exclude = [".lwpt/**"]

[dependencies]
# Dev-time only: the runtime library is RTL + fpjson, zero third-party
# dependencies (see docs/architecture.md). testing is the co-located
# *.Test.pas framework; resolved from the lwpt 0.2.0 release tag via an
# include filter (one filtered fetch per package), mirroring duetto.
testing = { source = "frostney/lwpt", version = "^0.2.0", include = ["packages/testing/**"], exclude = ["**/*.Test.pas"] }

[build]
mcpdemo  = { source = "source/apps/mcpdemo.pas",  output = "build/mcpdemo" }
mcpsmoke = { source = "source/apps/mcpsmoke.pas", output = "build/mcpsmoke" }
