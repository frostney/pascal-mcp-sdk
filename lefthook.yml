# pascal-mcp pre-commit hook.
#
# Install once per fresh clone:  lefthook install
#
# Local pre-commit runs the canonical formatter (`lwpt format`) and
# re-stages any files it rewrites. The heavyweight gates — `lwpt build`,
# `lwpt test`, the mcpsmoke E2E battery — run on the PR / CI workflows
# (see .github/workflows/) so local commits stay fast.
#
# lwpt is expected on PATH (installed from its GitHub release — see
# docs/quick-start.md). Point PASCALMCP_LWPT at another lwpt binary to
# override.
#
# Do NOT bypass with `git commit --no-verify` unless a maintainer
# explicitly authorises it on the PR.

min_version: 1.5.0

pre-commit:
  parallel: true

  commands:

    format:
      glob: "*.{pas,inc,dpr,toml}"
      run: ${PASCALMCP_LWPT:-lwpt} format
      stage_fixed: true
      fail_text: |
        lwpt format failed. Inspect the output above; the formatter only
        fails when it cannot parse a file. If lwpt is missing entirely
        (fresh clone), install the release binary first — see
        docs/quick-start.md.
